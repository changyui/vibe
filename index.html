<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Injection Training Simulator</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: #161b22;
            --neon-green: #39d353;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --warning-red: #ff7b72;
            --border-color: #30363d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 0 20px rgba(57, 211, 83, 0.05);
        }

        h1 {
            text-align: center;
            color: var(--neon-green);
            margin-bottom: 30px;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--neon-green);
            border-radius: 4px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1rem;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--neon-green);
            box-shadow: 0 0 8px rgba(57, 211, 83, 0.2);
        }

        input::placeholder {
            color: #484f58;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: transparent;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s ease;
            font-family: 'Courier New', Courier, monospace;
            margin-top: 10px;
        }

        button:hover {
            background-color: var(--neon-green);
            color: var(--bg-color);
        }

        .visualizer-container {
            margin-top: 30px;
            padding: 15px;
            background-color: #000;
            border-left: 4px solid var(--neon-green);
            border-radius: 4px;
        }

        .visualizer-title {
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #queryPreview {
            color: #d2a8ff;
            word-break: break-all;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        .user-input-highlight {
            color: #ff7b72;
            font-weight: bold;
        }

        .warning {
            margin-top: 40px;
            text-align: center;
            color: var(--warning-red);
            font-size: 0.85rem;
            max-width: 600px;
            line-height: 1.5;
            border-top: 1px dashed var(--border-color);
            padding-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>System Login</h1>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username (ID)</label>
                <input type="text" id="username" name="username" autocomplete="off" placeholder="admin' --">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" autocomplete="off" placeholder="••••••••">
            </div>
            
            <button type="submit" id="submitBtn">Authenticate</button>
        </form>

        <div class="visualizer-container">
            <div class="visualizer-title">Live Backend Query Preview</div>
            <div id="queryPreview"></div>
        </div>
    </div>

    <div class="warning">
        ⚠️ 경고: 본 페이지는 승인된 교육 및 모의 훈련 목적으로만 제공됩니다. 허가받지 않은 시스템에 대한 공격 시도는 법적 처벌을 받을 수 있습니다.
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const queryPreview = document.getElementById('queryPreview');
            const loginForm = document.getElementById('loginForm');
            const submitBtn = document.getElementById('submitBtn');

            const escapeHTML = (str) => {
                return str.replace(/[&<>'"]/g, 
                    tag => ({
                        '&': '&amp;',
                        '<': '&lt;',
                        '>': '&gt;',
                        "'": '&#39;',
                        '"': '&quot;'
                    }[tag] || tag)
                );
            };

            const updateQueryPreview = () => {
                const rawUser = usernameInput.value;
                const rawPass = passwordInput.value;
                
                const safeUser = escapeHTML(rawUser);
                const safePass = escapeHTML(rawPass);

                queryPreview.innerHTML = `SELECT * FROM users WHERE id = '<span class="user-input-highlight">${safeUser}</span>' AND password = '<span class="user-input-highlight">${safePass}</span>'`;
            };

            usernameInput.addEventListener('input', updateQueryPreview);
            passwordInput.addEventListener('input', updateQueryPreview);

            updateQueryPreview();

            loginForm.addEventListener('submit', (e) => {
                e.preventDefault(); 
                
                const payload = {
                    username: usernameInput.value,
                    password: passwordInput.value
                };
                
                console.log('%c[Target System Mock Backend]', 'color: #39d353; font-weight: bold; font-size: 1.1em;');
                console.log(`Endpoint: POST /api/v1/auth/login`);
                console.log(`Payload:`, payload);
                console.log(`%cExecuted SQL: SELECT * FROM users WHERE id = '${payload.username}' AND password = '${payload.password}'`, 'color: #ff7b72;');
                console.log('--------------------------------------------------');
                
                const originalText = submitBtn.innerText;
                submitBtn.innerText = "REQUEST SENT (CHECK CONSOLE)";
                submitBtn.style.backgroundColor = "var(--neon-green)";
                submitBtn.style.color = "var(--bg-color)";
                
                setTimeout(() => {
                    submitBtn.innerText = originalText;
                    submitBtn.style.backgroundColor = "transparent";
                    submitBtn.style.color = "var(--neon-green)";
                }, 2000);
            });
        });
    </script>
</body>
</html>
